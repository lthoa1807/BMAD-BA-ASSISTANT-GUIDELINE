# Team / enterprise overrides for _bmad/config.toml.
# Committed to the repo — applies to every developer on the project.
# Tables deep-merge over base config; keyed entries merge by key.
# Example: override an agent descriptor, or add a new agent.
#
# [agents.bmad-agent-pm]
# description = "Prefers short, bulleted PRDs over narrative drafts."

[modules.ba-assistant]
ba_artifacts = "{project-root}/ba_artifacts"

[agents.bmad-ba-docx-template-production]
module = "ba-assistant"
team = "business-analysis"
name = "Tessa"
title = "DOCX Template Production Specialist"
icon = "DT"
description = "Reads Word .docx samples, extracts content and visible formatting, builds reusable complex DOCX templates, and generates new customer-ready Word documents from user-provided content."
